name: deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      INFRA_DIR: infra/opentofu
      TFVARS_PATH: infra/opentofu/terraform.tfvars
      GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
      GCP_DEPLOY_SERVICE_ACCOUNT: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}
      GKE_CLUSTER_NAME: ${{ vars.GKE_CLUSTER_NAME }}
      GKE_CLUSTER_LOCATION: ${{ vars.GKE_CLUSTER_LOCATION }}
      TOFU_BACKEND_BUCKET: ${{ vars.TOFU_BACKEND_BUCKET }}
      TOFU_BACKEND_PREFIX: ${{ vars.TOFU_BACKEND_PREFIX }}
      ARTIFACT_REGISTRY_LOCATION: ${{ vars.ARTIFACT_REGISTRY_LOCATION }}
      ARTIFACT_REGISTRY_REPO: ${{ vars.ARTIFACT_REGISTRY_REPO }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required deploy configuration
        run: |
          set -euo pipefail
          required_vars=(
            GCP_PROJECT_ID
            GCP_WORKLOAD_IDENTITY_PROVIDER
            GCP_DEPLOY_SERVICE_ACCOUNT
            GKE_CLUSTER_NAME
            GKE_CLUSTER_LOCATION
            TOFU_BACKEND_BUCKET
            TOFU_BACKEND_PREFIX
            ARTIFACT_REGISTRY_LOCATION
            ARTIFACT_REGISTRY_REPO
          )

          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name:-}" ]]; then
              echo "Missing required GitHub Actions variable: ${var_name}" >&2
              exit 1
            fi
          done

          if [[ ! -s "$TFVARS_PATH" ]]; then
            echo "Missing committed OpenTofu var-file: $TFVARS_PATH" >&2
            exit 1
          fi

      - name: Set up OpenTofu
        run: scripts/setup-opentofu.sh

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Get GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: ${{ env.GKE_CLUSTER_NAME }}
          location: ${{ env.GKE_CLUSTER_LOCATION }}
          project_id: ${{ env.GCP_PROJECT_ID }}

      - name: Write OpenTofu backend config
        run: |
          set -euo pipefail
          printf 'bucket = "%s"\nprefix = "%s"\n' "$TOFU_BACKEND_BUCKET" "$TOFU_BACKEND_PREFIX" > "${INFRA_DIR}/backend.gcs.hcl"

      - name: Init OpenTofu backend
        run: |
          set -euo pipefail
          # OpenTofu provider downloads/signature checks can fail transiently via the
          # upstream registry or GitHub release assets. Retry init only; do not retry apply.
          for attempt in 1 2 3; do
            if tofu -chdir="${INFRA_DIR}" init -input=false -backend-config=backend.gcs.hcl; then
              exit 0
            fi

            if [[ "${attempt}" == "3" ]]; then
              break
            fi

            sleep_seconds=$((attempt * 15))
            echo "OpenTofu init failed on attempt ${attempt}; retrying in ${sleep_seconds}s..." >&2
            sleep "${sleep_seconds}"
          done

          echo "OpenTofu init failed after 3 attempts." >&2
          exit 1

      - name: Deploy app
        run: scripts/deploy-app-from-tofu.sh -var-file=terraform.tfvars
