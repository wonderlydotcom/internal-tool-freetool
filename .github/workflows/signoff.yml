name: signoff

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  signoff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Signoff
        run: |
          set -euo pipefail
          if [[ -f scripts/migration-prod-snapshot-gate.sh ]]; then
            bash -n scripts/migration-prod-snapshot-gate.sh
          fi
          echo "signoff"
